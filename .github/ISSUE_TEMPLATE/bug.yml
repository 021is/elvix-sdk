name: Bug report
description: Something is broken in @elvix.is/sdk.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: I called verifyElvixToken and...
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node 22 / Bun 1.3 / Next 16.2.6 / browser"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal code or curl commands that reliably trigger the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, stack traces, screenshots, anything else.
