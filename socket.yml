# Socket.dev configuration — see https://docs.socket.dev/docs/socket-yml
#
# Acknowledged alerts: each entry documents WHY the alert is accepted.
# Acknowledgement does not reduce real risk; it tells downstream Socket
# consumers that we audited the alert and chose not to drop the dep.

version: 2

issueRules:
  # @modelcontextprotocol/sdk has 6 npm maintainers across @anthropic.com
  # and personal @gmail.com accounts. Socket flags this as "unstable
  # ownership" — the risk surface is real (any one hijacked publisher
  # could push a malicious patch). Mitigations we apply:
  #   - Exact version pin (no caret) in package.json, so a hijacked
  #     1.29.x cannot flow into our consumers via semver-range upgrade.
  #   - Manual upgrade gate: every MCP-SDK bump goes through a PR
  #     review on 021is/elvix-sdk with a CHANGELOG entry.
  #   - Planned: split the MCP server into a separate subpackage
  #     (@elvix.is/sdk-mcp) so React-only customers never pull this
  #     transitive at all. Tracked in axon/plans/active.md.
  unstableOwnership:
    action: ignore
